<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone-Amazon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div>
            <img src="assets/logo.png" alt="Clone-Amazon Logo" id="logo-amazon">
        </div>
        <nav>
            <span>All</span>
            <span>Today's Deals</span>
            <span>Customer Service</span>
            <span>Registry</span>
            <span>Gift Cards</span>
            <span>Sell</span>
        </nav>
    </header>
    <main>
        <div class="banner-orange">
            <p>Shop All Holiday Gift Cards</p>
        </div>
        <div class="banner-green">
            <h1>Holiday Gift Guides <span>Be a go-gifter</span></h1>
        </div>
        <section class="section-row-1">
            <h2 class="title-row-1">Find the perfect gift <span>Shop now</span></h2>
            <div class="row-1">
                <img class="img-row-1" src="assets/img_1.jpg" alt="Image 1">
                <img class="img-row-1" src="assets/img_2.jpg" alt="Image 2">
                <img class="img-row-1" src="assets/img_3.jpg" alt="Image 3">
                <img class="img-row-1" src="assets/img_4.jpg" alt="Image 4">
            </div>
        </section>
        <section>
            <img src="assets/img_9.png" alt="imagine-visor" class="img-visor">
            <h2>Play the gifting game <span>Shop gaming</span></h2>
        </section>
    </main>
    <footer></footer>
</body>

</html>
